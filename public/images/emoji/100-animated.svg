<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Animated 100 emoji">
<style>
  svg {
    overflow: visible;
  }
  .part {
    transform-box: fill-box;
    transform-origin: center;
    animation: pop 3.2s cubic-bezier(.22,.61,.36,1) infinite both;
  }
  .fill {
    fill: #f44336;
    fill-rule: evenodd;
    animation: reveal 3.2s linear infinite both;
  }
  .outline {
    fill: none;
    stroke: #f44336;
    stroke-width: 8;
    stroke-linecap: round;
    stroke-linejoin: round;
    vector-effect: non-scaling-stroke;
    pathLength: 100;
    stroke-dasharray: 100;
    stroke-dashoffset: 100;
    animation: draw 3.2s ease-out infinite both;
  }
  .part.underline1, .part.underline2 {
    transform-origin: left center;
  }
  @keyframes pop {
    0%, 6% { opacity: 0; transform: translateY(10px) scale(.94); }
    12% { opacity: 1; transform: translateY(0) scale(1.03); }
    18%, 82% { opacity: 1; transform: translateY(0) scale(1); }
    90%, 100% { opacity: 0; transform: translateY(0) scale(1); }
  }
  @keyframes reveal {
    0%, 8% { fill-opacity: 0; }
    16%, 82% { fill-opacity: 1; }
    90%, 100% { fill-opacity: 0; }
  }
  @keyframes draw {
    0% { stroke-dashoffset: 100; opacity: 1; }
    12% { stroke-dashoffset: 0; opacity: 1; }
    82% { stroke-dashoffset: 0; opacity: .18; }
    90%, 100% { stroke-dashoffset: 0; opacity: 0; }
  }
  .one { animation-delay: 0.0s; }
  .one .fill, .one .outline { animation-delay: 0.0s; }
  .hundred { animation-delay: 0.18s; }
  .hundred .fill, .hundred .outline { animation-delay: 0.18s; }
  .underline1 { animation-delay: 0.78s; }
  .underline1 .fill, .underline1 .outline { animation-delay: 0.78s; }
  .underline2 { animation-delay: 0.98s; }
  .underline2 .fill, .underline2 .outline { animation-delay: 0.98s; }
</style>
